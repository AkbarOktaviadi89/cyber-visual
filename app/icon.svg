<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#060810"/>
  <!-- Outer glow ring (subtle) -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Shield body -->
  <path d="M16 4.5 L24.5 8 L24.5 17 C24.5 22 21 26 16 28 C11 26 7.5 22 7.5 17 L7.5 8 Z"
        fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Exclamation line -->
  <line x1="16" y1="12" x2="16" y2="20" stroke="#ff0055" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Exclamation dot -->
  <circle cx="16" cy="23" r="1.3" fill="#ff0055"/>
</svg>
